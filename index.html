
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --yellow: #f1c40f; 
            --grey: #95a5a6; /* Το γκρι της κάρτας */
            --dark-grey: #4a4a4a;
        }
        
        * { box-sizing: border-box; font-family: 'Comfortaa', cursive; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; padding: 0; background: white; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        .wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; height: 100%; justify-content: space-between; }

        /* HEADER - ΣΥΜΦΩΝΑ ΜΕ ΤΟ PDF */
        .header-section { text-align: center; padding-top: 30px; }
        .logo-main { color: var(--yellow); font-size: 2.3em; font-weight: 700; margin: 0; text-transform: uppercase; }
        .sub-name { color: var(--yellow); font-size: 1.2em; margin-top: 5px; }

        /* UI GRID - ΕΠΑΝΑΦΟΡΑ ΣΕ ΚΙΤΡΙΝΟ/ΓΚΡΙ */
        .ui-grid { display: grid; grid-template-columns: 1fr 140px 1fr; align-items: center; flex-grow: 1; padding: 20px; }
        .side-col { display: flex; flex-direction: column; gap: 45px; align-items: center; }
        
        /* Εικονίδια από PDF */
        .icon-btn { width: 35px; height: 35px; fill: var(--yellow); cursor: pointer; }
        .gear-svg { width: 120px; fill: var(--grey); opacity: 0.3; animation: rotate 25s linear infinite; }

        /* FOOTER - ΓΚΡΙ ΜΕ ΛΕΥΚΑ ΓΡΑΜΜΑΤΑ */
        .footer { 
            background: var(--grey); 
            color: white; 
            padding: 20px 0 40px 0; 
            text-align: center;
            width: 100%;
            border-top: 5px solid white;
        }
        .footer a { color: white; text-decoration: none; font-size: 0.9em; display: block; margin: 4px 0; }
        .footer .address { font-weight: bold; margin-bottom: 5px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Το Εργαστήρι - Τουμαζάτος Νίκος: Μαθήματα Ζωγραφικής, Ελεύθερου Σχεδίου, Comic, Cartoon και Εικονογράφησης στον Πύργο.">
    <meta name="keywords" content="Ζωγραφική, Σχέδιο, Comic, Cartoon, Εικονογράφηση, Πύργος, Τουμαζάτος Νίκος, Το Εργαστήρι">
    <meta name="author" content="Τουμαζάτος Νίκος">
    
    <meta property="og:title" content="Το Εργαστήρι - Τουμαζάτος Νίκος">
    <meta property="og:description" content="Καλλιτεχνικό εργαστήρι στον Πύργο.">
    <meta property="og:image" content="images/index-layout.png">
    
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος</title>

    <style>
        :root { --yellow-brand: #f1c40f; }
        
        body { 
            margin: 0; 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            animation: fadeIn 0.8s ease-in; /* Απαλό εφέ εισαγωγής */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .main-layout { width: 100%; display: block; }

        /* Δυναμικό Κείμενο πάνω από τα γρανάζια */
        #display-text {
            position: absolute;
            top: 25.5%; 
            width: 100%;
            text-align: center;
            color: var(--yellow-brand);
            font-weight: bold;
            font-size: 1.4em;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            pointer-events: none;
            min-height: 1.5em;
            transition: transform 0.3s ease;
        }

        /* Στυλ Κουμπιών (Calibration Mode: Κόκκινο/Πράσινο) */
        .cal-box {
            position: absolute;
            background: rgba(255, 0, 0, 0.3); /* Κάνε το 0 για να γίνει αόρατο */
            border: 1px solid rgba(255, 0, 0, 0.5);
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.2s ease;
        }

        /* Εφέ μεγέθυνσης όταν το χέρι πλησιάζει (Hover) */
        .cal-box:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 0, 0.2);
        }

        .footer-box {
            position: absolute;
            background: rgba(0, 255, 0, 0.3); /* Κάνε το 0 για να γίνει αόρατο */
            border: 1px solid rgba(0, 255, 0, 0.5);
            cursor: pointer;
        }

        /* --- ΠΟΣΟΣΤΑ ΒΑΘΜΟΝΟΜΗΣΗΣ (Προσάρμοσε στον Acer Nitro) --- */
        
        /* Αριστερά εικονίδια */
        .btn-1 { top: 43.5%; left: 3%;  width: 12%; height: 6.5%; } /* ΕΛΕΥΘΕΡΟ ΣΧΕΔΙΟ */
        .btn-2 { top: 50.5%; left: 3%;  width: 12%; height: 6.5%; } /* ΖΩΓΡΑΦΙΚΗ */
        .btn-3 { top: 57.5%; left: 3%;  width: 12%; height: 6.5%; } /* COMIK */

        /* Δεξιά εικονίδια */
        .btn-4 { top: 43.5%; right: 3%; width: 12%; height: 6.5%; } /* CARTOON */
        .btn-5 { top: 50.5%; right: 3%; width: 12%; height: 6.5%; } /* ΕΙΚΟΝΟΓΡΑΦΗΣΗ */
        .btn-6 { top: 57.5%; right: 3%; width: 12%; height: 6.5%; } /* PORTFOLIO */

        /* Footer Στοιχεία (Ενεργά Links) */
        .f-addr { bottom: 17%; left: 10%; width: 80%; height: 5%; } 
        .f-tel  { bottom: 11%; left: 20%; width: 60%; height: 5%; } 
        .f-mail { bottom: 5%;  left: 10%; width: 80%; height: 5%; } 

    </style>
</head>
<body>

<div class="wrapper">
    <div id="display-text"></div>
    <img src="images/index-layout.png" alt="Το Εργαστήρι Layout" class="main-layout">

    <div class="cal-box btn-1" onmouseover="showText('ΕΛΕΥΘΕΡΟ ΣΧΕΔΙΟ')" onmouseout="clearText()"></div>
    <div class="cal-box btn-2" onmouseover="showText('ΖΩΓΡΑΦΙΚΗ')" onmouseout="clearText()"></div>
    <div class="cal-box btn-3" onmouseover="showText('COMIK')" onmouseout="clearText()"></div>
    <div class="cal-box btn-4" onmouseover="showText('CARTOON')" onmouseout="clearText()"></div>
    <div class="cal-box btn-5" onmouseover="showText('ΕΙΚΟΝΟΓΡΑΦΗΣΗ')" onmouseout="clearText()"></div>
    <div class="cal-box btn-6" onclick="openPortfolio()" onmouseover="showText('PORTFOLIO')" onmouseout="clearText()"></div>

    <a href="https://maps.app.goo.gl/YourLinkHere" target="_blank" class="footer-box f-addr"></a>
    <a href="tel:6939637129" class="footer-box f-tel"></a>
    <a href="mailto:toergastiripirgos@gmail.com" class="footer-box f-mail"></a>
</div>

<script>
    function showText(msg) {
        const txt = document.getElementById('display-text');
        txt.innerText = msg;
        txt.style.transform = "scale(1.1)";
    }

    function clearText() {
        const txt = document.getElementById('display-text');
        txt.innerText = "";
        txt.style.transform = "scale(1)";
    }

    function openPortfolio() {
        // Θα ενεργοποιηθεί όταν το Portfolio είναι έτοιμο
        alert("Ανοίγει το Portfolio του Νίκου...");
    }
</script>

</body>
</html>

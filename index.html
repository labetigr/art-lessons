<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το ΕΡΓΑΣΤΗΡΙ - Νίκος Τουμαζάτος</title>
    <style>
        :root {
            --yellow: #f2d027; /* Το Κίτρινο της Κάρτας */
            --black: #000000;  /* Ο Μαύρος Κώδικας */
            --grey: #8a8d8f;   /* Το Γκρι της Κάρτας */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        /* HEADER SECTION */
        header {
            text-align: center;
            padding: 40px 20px;
        }

        .brand {
            color: var(--yellow);
            font-size: 3rem;
            font-weight: bold;
            margin: 0;
            letter-spacing: 2px;
        }

        /* MAIN VISUAL AREA */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* ΡΥΘΜΙΣΗ: ΜΕΓΑΛΟ ΓΡΑΝΑΖΙ ΣΤΗ ΜΕΣΗ */
        .main-gear {
            width: 320px; /* Αυξημένο μέγεθος */
            height: auto;
            fill: var(--yellow);
            margin: 20px 0;
        }

        /* ΡΥΘΜΙΣΗ: ΜΙΚΡΑ ΕΙΚΟΝΙΔΙΑ */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-top: 20px;
        }

        .small-icon {
            width: 30px; /* Μικρό μέγεθος */
            height: auto;
            fill: var(--yellow);
        }

        /* TEXT SECTION */
        .artist-info {
            text-align: center;
            margin-top: 30px;
        }

        .name {
            color: var(--yellow);
            font-size: 1.8rem;
            margin: 0;
        }

        .title {
            color: #ffffff;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* FOOTER: ΤΟ ΓΚΡΙ ΤΗΣ ΚΑΡΤΑΣ */
        footer {
            width: 100%;
            background-color: var(--grey);
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .footer-link {
            color: #ffffff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">ΤΟ ΕΡΓΑΣΤΗΡΙ</div>
    </header>

    <div class="container">

        <div class="icon-grid">

    </div>

</html>

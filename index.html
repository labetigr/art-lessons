
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος | Πύργος</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        :root { 
            --yellow: #f1c40f; 
            --grey: #808080; /* ΚΑΘΑΡΟ ΓΚΡΙ */
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: sans-serif; background: white; 
        }

        .wrapper { 
            display: flex; flex-direction: column; 
            height: 100vh; width: 100%;
            justify-content: space-between; align-items: center;
            padding-top: 20px;
        }

        .header-section { flex-shrink: 0; text-align: center; }
        #display-text { height: 25px; color: var(--yellow); font-weight: bold; font-size: 1.1em; text-transform: uppercase; }
        .logo-main { color: var(--yellow); font-size: 2.1em; font-weight: 900; margin: 0; letter-spacing: -1px; }

        .ui-grid { 
            display: grid; 
            grid-template-columns: 1fr 140px 1fr; 
            align-items: center; justify-content: center; 
            width: 100%; max-width: 380px; flex-grow: 1;
        }

        .side-col { display: flex; flex-direction: column; gap: 40px; align-items: center; }
        .icon-btn { width: 40px; height: 40px; cursor: pointer; transition: transform 0.2s; }
        .icon-btn img { width: 100%; height: 100%; object-fit: contain; }
        .icon-btn:active { transform: scale(0.8); }

        .gears { display: flex; justify-content: center; }
        .gear-img { width: 120px; height: auto; }

        .bottom-section { 
            width: 100%; flex-shrink: 0; text-align: center; 
            margin-bottom: 80px; 
        }
        .name-tag { padding-bottom: 20px; }
        .name-tag h1 { font-size: 1.5em; margin: 0; color: var(--yellow); }
        .name-tag p { margin: 2px 0; font-size: 1em; font-weight: bold; color: #57585a; }

        /* FOOTER: ΕΠΙΒΟΛΗ ΓΚΡΙ ΧΡΩΜΑΤΟΣ */
        .footer { 
            background-color: var(--grey) !important; 
            color: white !important; 
            padding: 15px 0 30px 0; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 6px;
            z-index: 100;
        }
        .footer a { color: white !important; text-decoration: none; font-size: 0.95em; }

        #portfolio-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; transform: translateY(100%); transition: 0.4s ease; display: flex; flex-direction: column; }
        #portfolio-overlay.active { transform: translateY(0); }
        .close-btn { padding: 15px; font-size: 35px; cursor: pointer; text-align: right; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-section">
        <div id="display-text"></div>
        <h1 class="logo-main">Το ΕΡΓΑΣΤΗΡΙ</h1>
    </div>
    
    <div class="ui-grid">
        <div class="side-col">
            <div class="icon-btn" onclick="show('ΖΩΓΡΑΦΙΚΗ')"><img src="Painting.png" alt=""></div>
            <div class="icon-btn" onclick="show('ΕΛΕΥΘΕΡΟ ΣΧΕΔΙΟ')"><img src="Drawing.png" alt=""></div>
            <div class="icon-btn" onclick="show('COMIC')"><img src="Comic.png" alt=""></div>
        </div>
        <div class="gears">
            <img src="Gears.png" class="gear-img" alt="">
        </div>
        <div class="side-col">
            <div class="icon-btn" onclick="show('CARTOON')"><img src="Cartoon.png" alt=""></div>
            <div class="icon-btn" onclick="show('ΕΙΚΟΝΟΓΡΑΦΗΣΗ')"><img src="Illustration.png" alt=""></div>
            <div class="icon-btn" onclick="openPortfolio()"><img src="Portfolio.png" alt=""></div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="name-tag">
            <h1>Τουμαζάτος Νίκος</h1>
            <p>Illustrator - Ζωγράφος</p>
        </div>
        <div class="footer">
            <a href="https://maps.google.com/?q=Παπαφλέσσα+47+Πύργος" target="_blank">📍 Παπαφλέσσα 47, Πύργος</a>
            <a href="tel:6939637129">📞 6939 637129</a>
            <a href="mailto:toumazatosn@gmail.com">✉️ toumazatosn@gmail.com</a>
        </div>
    </div>
</div>

<script>
    function show(msg) {
        const display = document.getElementById('display-text');
        display.innerHTML = msg;
        setTimeout(() => { if(display.innerHTML === msg) display.innerHTML = ''; }, 2000);
    }
    function openPortfolio() { document.getElementById('portfolio-overlay').classList.add('active'); }
    function closePortfolio() { document.getElementById('portfolio-overlay').classList.remove('active'); }
</script>

</body>
</html>

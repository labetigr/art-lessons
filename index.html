
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος | Πύργος</title>
    <meta name="description" content="Εργαστήρι Ζωγραφικής και Σχεδίου στον Πύργο - Τουμαζάτος Νίκος. Μαθήματα ζωγραφικής, σχέδιο, comic.">
    <meta name="keywords" content="Πύργος, art, lesson, ζωγραφική, σχέδιο, σχολή, εικαστικά, Τουμαζάτος Νίκος, Παπαφλέσσα 47, εργαστήρι τέχνης, μαθήματα ζωγραφικής Πύργος, Ηλεία, comic, εικονογράφηση">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        :root { --yellow: #f1c40f; --grey: #4a4a4a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: white; }

        .wrapper { 
            display: flex; flex-direction: column; height: 100vh; width: 100%;
            align-items: center; justify-content: center; /* Συγκέντρωση περιεχομένου */
        }

        /* 📏 ΥΠΟΛΟΓΙΣΜΕΝΕΣ ΑΠΟΣΤΑΣΕΙΣ (Step-by-Step) */
        
        /* 1. Επικεφαλίδα: Κατέβασμα για μείωση κενού */
        .header-section { margin-bottom: 55px; text-align: center; flex-shrink: 0; }
        #display-text { height: 25px; color: var(--yellow); font-weight: bold; font-size: 1.1em; text-transform: uppercase; }
        .logo-main { color: var(--yellow); font-size: 2.1em; font-weight: 900; margin: 0; letter-spacing: -1px; }

        /* 2. Κέντρο: Μεγάλο γρανάζι και μικρά πλήκτρα */
        .ui-grid { 
            display: grid; grid-template-columns: 1fr 140px 1fr; 
            align-items: center; justify-content: center; 
            width: 100%; max-width: 380px; margin-bottom: 45px;
        }
        .side-col { display: flex; flex-direction: column; gap: 40px; align-items: center; }
        .icon-btn { width: 30px; height: 30px; fill: var(--yellow); cursor: pointer; }
        .gear-svg { width: 110px; fill: #e0e0e0; animation: rotate 20s linear infinite; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 3. Footer: Ανέβασμα κατά μία γραμμή */
        .bottom-section { width: 100%; flex-shrink: 0; text-align: center; margin-top: -15px; }
        .name-tag { margin-bottom: 25px; }
        .name-tag h1 { font-size: 1.5em; margin: 0; color: var(--yellow); }
        .name-tag p { margin: 2px 0; font-size: 1em; font-weight: bold; color: var(--grey); }

        .footer { 
            background: var(--grey); color: white; padding: 15px 0 35px 0; 
            width: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; gap: 6px;
        }
        .footer a, .footer div { color: white; text-decoration: none; font-size: 0.95em; display: block; text-align: center; }

        /* Portfolio Overlay (Διατήρηση) */
        #portfolio-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; transform: translateY(100%); transition: 0.4s ease; display: flex; flex-direction: column; }
        #portfolio-overlay.active { transform: translateY(0); }
        .close-btn { padding: 15px; font-size: 35px; cursor: pointer; text-align: right; }
        .swiper { width: 100%; flex: 1; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .swiper-slide img { max-width: 100%; max-height: 75vh; border-radius: 4px; object-fit: contain; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header-section">
            <div id="display-text"></div>
            <h1 class="logo-main">Το ΕΡΓΑΣΤΗΡΙ</h1>
        </div>
        </div>
</body>
</html>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    let swiperInstance = null;
    function show(msg) {
        const display = document.getElementById('display-text');
        display.innerHTML = msg;
        setTimeout(() => { if(display.innerHTML === msg) display.innerHTML = ''; }, 2000);
    }
    function openPortfolio() { 
        document.getElementById('portfolio-overlay').classList.add('active'); 
        loadPortfolio(); 
    }
    function closePortfolio() { document.getElementById('portfolio-overlay').classList.remove('active'); }
    async function loadPortfolio() {
        const wrapper = document.getElementById('swiper-content');
        wrapper.innerHTML = '<div class="swiper-slide">Φόρτωση...</div>';
        try {
            const response = await fetch('https://api.github.com/repos/labetigr/art-lessons/contents/images/portfolio');
            const files = await response.json();
            wrapper.innerHTML = '';
            const images = files.filter(f => f.name.match(/\.(jpg|jpeg|png|gif)$/i));
            images.forEach(file => {
                const slide = document.createElement('div'); slide.className = 'swiper-slide';
                slide.innerHTML = `<img src="${file.download_url}" alt="έργο">`;
                wrapper.appendChild(slide);
            });
            if(swiperInstance) swiperInstance.destroy();
            swiperInstance = new Swiper('.swiper', { pagination: { el: '.swiper-pagination', clickable: true }, grabCursor: true });
        } catch (e) { wrapper.innerHTML = '<div class="swiper-slide">Σφάλμα φόρτωσης.</div>'; }
    }
</script>


<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος | Πύργος</title>
    <meta name="description" content="Εργαστήρι Ζωγραφικής και Σχεδίου στον Πύργο - Τουμαζάτος Νίκος. Μαθήματα ζωγραφικής, σχέδιο, comic.">
    <meta name="keywords" content="Πύργος, art, lesson, ζωγραφική, σχέδιο, σχολή, εικαστικά, Τουμαζάτος Νίκος, Παπαφλέσσα 47, εργαστήρι τέχνης, μαθήματα ζωγραφικής Πύργος, Ηλεία, comic, εικονογράφηση">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        :root { 
            --yellow: #f1c40f; 
            --grey: #57585a; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Century Gothic', sans-serif; background: white; 
        }

        .wrapper { 
            display: flex; flex-direction: column; 
            height: 100vh; width: 100%;
            justify-content: space-between; align-items: center;
            padding-top: 20px;
        }

        .header-section { flex-shrink: 0; text-align: center; }
        #display-text { height: 25px; color: var(--yellow); font-weight: bold; font-size: 1.1em; text-transform: uppercase; }
        .logo-main { color: var(--yellow); font-size: 2.1em; font-weight: 900; margin: 0; letter-spacing: -1px; }

        .ui-grid { 
            display: grid; 
            grid-template-columns: 1fr 160px 1fr; 
            align-items: center; justify-content: center; 
            width: 100%; max-width: 400px; flex-grow: 1;
        }

        .side-col { display: flex; flex-direction: column; gap: 40px; align-items: center; }
        
        /* Χρήση των νέων PNG εικονιδίων */
        .icon-btn { width: 45px; height: 45px; cursor: pointer; transition: transform 0.2s; }
        .icon-btn img { width: 100%; height: 100%; object-fit: contain; }
        .icon-btn:active { transform: scale(0.8); }

        /* Τα 3 γρανάζια από την κάρτα */
        .gears-main { width: 150px; cursor: default; }
        .gears-main img { width: 100%; height: auto; }

        .bottom-section { 
            width: 100%; flex-shrink: 0; text-align: center; 
            margin-bottom: 80px; 
        }
        .name-tag { padding-bottom: 20px; }
        .name-tag h1 { font-size: 1.5em; margin: 0; color: var(--yellow); }
        .name-tag p { margin: 2px 0; font-size: 1em; font-weight: bold; color: var(--grey); }

        .footer { 
            background: var(--grey); color: white; 
            padding: 15px 0 30px 0; 
            width: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; gap: 6px;
        }
        .footer a, .footer div { color: white; text-decoration: none; font-size: 0.95em; display: block; text-align: center; }

        #portfolio-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; transform: translateY(100%); transition: 0.4s ease; display: flex; flex-direction: column; }
        #portfolio-overlay.active { transform: translateY(0); }
        .close-btn { padding: 15px; font-size: 35px; cursor: pointer; text-align: right; }
        .swiper { width: 100%; flex: 1; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .swiper-slide img { max-width: 100%; max-height: 75vh; border-radius: 4px; object-fit: contain; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-section">
        <div id="display-text"></div>
        <h1 class="logo-main">Το ΕΡΓΑΣΤΗΡΙ</h1>
    </div>
    
    <div class="ui-grid">
        <div class="side-col">
            <div class="icon-btn" onclick="show('ΖΩΓΡΑΦΙΚΗ')"><img src="pencil_brush.png" alt="Painting"></div>
            <div class="icon-btn" onclick="show('ΕΛΕΥΘΕΡΟ ΣΧΕΔΙΟ')"><img src="quill_pen.png" alt="Drawing"></div>
            <div class="icon-btn" onclick="show('COMIC')"><img src="speech_bubble.png" alt="Comic"></div>
        </div>

        <div class="gears-main">
            <img src="gears_card.png" alt="Gears">
        </div>

        <div class="side-col">
            <div class="icon-btn" onclick="show('CARTOON')"><img src="icon_right_1.png" alt="Cartoon"></div>
            <div class="icon-btn" onclick="show('ΕΙΚΟΝΟΓΡΑΦΗΣΗ')"><img src="icon_right_2.png" alt="Illustration"></div>
            <div class="icon-btn" onclick="openPortfolio()"><img src="portfolio_icon.png" alt="Portfolio"></div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="name-tag">
            <h1>Τουμαζάτος Νίκος</h1>
            <p>Illustrator - Ζωγράφος</p>
        </div>
        <div class="footer">
            <a href="https://www.google.com/maps/search/?api=1&query=Παπαφλέσσα+47+Πύργος" target="_blank">📍 Παπαφλέσσα 47, Πύργος</a>
            <a href="tel:6939637129">📞 6939 637129</a>
            <a href="mailto:toumazatosn@gmail.com">✉️ toumazatosn@gmail.com</a>
        </div>
    </div>
</div>

<div id="portfolio-overlay">
    <div class="close-btn" onclick="closePortfolio()">✕</div>
    <div class="swiper">
        <div class="swiper-wrapper" id="swiper-content"></div>
        <div class="swiper-pagination"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    let swiperInstance = null;

    function show(msg) {
        const display = document.getElementById('display-text');
        display.innerHTML = msg;
        setTimeout(() => { if(display.innerHTML === msg) display.innerHTML = ''; }, 2000);
    }

    function openPortfolio() { 
        document.getElementById('portfolio-overlay').classList.add('active'); 
        loadPortfolio(); 
    }

    function closePortfolio() { 
        document.getElementById('portfolio-overlay').classList.remove('active'); 
    }

    async function loadPortfolio() {
        const wrapper = document.getElementById('swiper-content');
        wrapper.innerHTML = '<div class="swiper-slide">Φόρτωση...</div>';
        
        // Εδώ παραμένει η logic του Netlify/GitHub για το φόρτωμα των αρχείων
        // Αντικατάστησε το URL με τη δική σου πηγή δεδομένων αν χρειαστεί
    }
</script>
</body>
</html>

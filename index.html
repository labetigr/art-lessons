
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος</title>
    <style>
        :root {
            --yellow: #f1c40f;
            --grey: #4a4a4a;
            --light-grey: #f4f4f4;
        }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: white; color: var(--grey); overflow: hidden; }
        
        .wrapper { display: flex; flex-direction: column; height: 100vh; justify-content: space-between; align-items: center; padding-top: 20px; }

        #display-text { height: 30px; color: var(--yellow); font-weight: bold; font-size: 1.1em; letter-spacing: 1px; text-transform: uppercase; }

        .logo-main { color: var(--yellow); font-size: 2.5em; font-weight: 900; margin: 0; letter-spacing: -1px; }

        /* Grid Layout για 3 - Γρανάζια - 3 */
        .ui-grid { display: grid; grid-template-columns: 60px 180px 60px; align-items: center; justify-items: center; gap: 10px; }
        
        .side-col { display: flex; flex-direction: column; gap: 30px; }

        .icon-btn { width: 35px; height: 35px; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:active { transform: scale(0.85); }
        .icon-btn img { width: 100%; height: auto; }

        .gears { width: 160px; filter: grayscale(1); opacity: 0.8; }

        .name-tag { text-align: center; margin-bottom: 20px; }
        .name-tag h1 { font-size: 1.4em; margin: 0; color: var(--yellow); }
        .name-tag p { font-size: 0.9em; margin: 0; opacity: 0.7; }

        /* Footer */
        .footer { background: var(--grey); color: white; width: 100%; padding: 25px 0; text-align: center; font-size: 0.9em; line-height: 1.6; }
        .footer a { color: white; text-decoration: none; display: block; width: 100%; }
        .footer .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 8px auto; width: 80%; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="display-text"></div>
    
    <h1 class="logo-main">Το ΕΡΓΑΣΤΗΡΙ</h1>

    <div class="ui-grid">
        <div class="side-col">
            <div class="icon-btn" onclick="show('ΖΩΓΡΑΦΙΚΗ')">🎨</div>
            <div class="icon-btn" onclick="show('ΕΛΕΥΘΕΡΟ ΣΧΕΔΙΟ')">✏️</div>
            <div class="icon-btn" onclick="show('COMIC')">💬</div>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/1110/1110260.png" class="gears" alt="Gears">

        <div class="side-col">
            <div class="icon-btn" onclick="show('CARTOON')">⭐</div>
            <div class="icon-btn" onclick="show('ΕΙΚΟΝΟΓΡΑΦΗΣΗ')">🖋️</div>
            <div class="icon-btn" onclick="show('PORTFOLIO')">📁</div>
        </div>
    </div>

    <div class="name-tag">
        <h1>Τουμαζάτος Νίκος</h1>
        <p>Illustrator - Ζωγράφος</p>
    </div>

    <div class="footer">
        <a href="https://www.google.com/maps/search/?api=1&query=Παπαφλέσσα+47+Πύργος" target="_blank">Παπαφλέσσα 47, Πύργος</a>
        <div class="divider"></div>
        <a href="tel:6939637129">τηλ.: 6939 637129</a>
        <div class="divider"></div>
        <a href="mailto:toumazatosn@gmail.com">toumazatosn@gmail.com</a>
    </div>
</div>

<script>
    function show(text) {
        const display = document.getElementById('display-text');
        display.innerText = text;
        setTimeout(() => { display.innerText = ''; }, 2500);
    }
</script>

</body>
</html>

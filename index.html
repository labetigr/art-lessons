
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος</title>
    <style>
        :root { --yellow: #f1c40f; --grey: #4a4a4a; --light-grey: #f4f4f4; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: white; color: var(--grey); text-align: center; overflow-x: hidden; }
        .wrapper { display: flex; flex-direction: column; min-height: 100vh; justify-content: space-between; }
        
        #display-text { height: 50px; color: var(--yellow); font-weight: bold; font-size: 1.3em; text-transform: uppercase; padding-top: 20px; transition: all 0.3s; }
        .logo-main { color: var(--yellow); font-size: 2.5em; font-weight: 900; margin: 10px 0; letter-spacing: -1px; }

        .ui-grid { display: grid; grid-template-columns: 1fr 160px 1fr; align-items: center; justify-content: center; margin: 30px auto; max-width: 450px; }
        .side-col { display: flex; flex-direction: column; gap: 50px; align-items: center; }
        
        /* Custom Icons Style */
        .icon-btn { width: 40px; height: 40px; fill: var(--yellow); cursor: pointer; transition: transform 0.2s; }
        .icon-btn:active { transform: scale(0.8); }

        /* Gear Animation */
        .gears-container { position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
        .gear-svg { width: 100px; fill: #d3d3d3; animation: rotateGears 10s linear infinite; }
        
        @keyframes rotateGears {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .name-tag { margin-bottom: 30px; }
        .name-tag h1 { font-size: 1.6em; margin: 0; color: var(--yellow); text-transform: uppercase; }
        .name-tag p { font-size: 1em; margin: 5px 0; opacity: 0.8; letter-spacing: 1px; }

        .footer { background: var(--grey); color: white; padding: 30px 0; font-size: 0.95em; }
        .footer a { color: white; text-decoration: none; display: block; margin: 12px 0; transition: opacity 0.2s; }
        .footer a:active { opacity: 0.6; }
        .footer .divider { height: 1px; background: rgba(255,255,255,0.1); width: 70%; margin: 0 auto; }
    </style>
</head>

<script>
    function show(msg) {
        const display = document.getElementById('display-text');
        display.style.opacity = '0';
        setTimeout(() => {
            display.innerHTML = msg;
            display.style.opacity = '1';
        }, 200);
        
        setTimeout(() => {
            display.style.opacity = '0';
            setTimeout(() => { display.innerHTML = ''; }, 300);
        }, 3000);
    }
</script>

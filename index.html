
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος</title>
    <meta name="description" content="Εικονογράφηση - Ζωγραφική - Μαθήματα Τέχνης στον Πύργο.">
    <meta property="og:title" content="Το Εργαστήρι - Τουμαζάτος Νίκος">
    <meta property="og:description" content="Ελεύθερο σχέδιο, ζωγραφική, κόμικς. Παπαφλέσσα 47, Πύργος.">
    <meta property="og:image" content="https://art-lessons.gr/logo.jpg">
    <meta property="og:url" content="https://art-lessons.gr">
    <meta property="og:type" content="website">

    <style>
        :root { --yellow: #f1c40f; --grey: #4a4a4a; --white: #ffffff; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--white); color: var(--grey); overflow-x: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; justify-content: space-between; align-items: center; padding-top: 30px; }
        #display-text { height: 40px; color: var(--yellow); font-weight: bold; font-size: 1.2em; text-transform: uppercase; text-align: center; }
        .logo-header { color: var(--yellow); font-size: 2.2em; font-weight: 900; margin: 10px 0; letter-spacing: -1px; text-align: center; }
        .main-container { display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; justify-items: center; width: 100%; max-width: 400px; }
        .column { display: flex; flex-direction: column; gap: 35px; }
        .btn { width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.8em; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.8); }
        .gears-img { width: 100%; max-width: 150px; opacity: 0.8; filter: grayscale(1); }
        .name-section { text-align: center; margin-bottom: 20px; }
        .name-section h2 { font-size: 1.5em; margin: 0; color: var(--yellow); }
        .name-section p { font-size: 0.9em; margin: 5px 0 0 0; opacity: 0.8; }
        .footer { background: var(--grey); color: var(--white); width: 100%; padding: 20px 0; text-align: center; font-size: 0.95em; }
        .footer a { color: var(--white); text-decoration: none; display: block; padding: 12px 0; width: 100%; }
        .footer .line { height: 1px; background: rgba(255,255,255,0.1); margin: 0 auto; width: 85%; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="display-text"></div>
    <div class="logo-header">Το ΕΡΓΑΣΤΗΡΙ</div>
    <div class="main-container">
        <div class="column">
            <div class="btn" onclick="show('ΕΛΕΥΘΕΡΟ ΣΧΕΔΙΟ')">✏️</div>
            <div class="btn" onclick="show('ΖΩΓΡΑΦΙΚΗ')">🎨</div>
            <div class="btn" onclick="show('COMIC')">💬</div>
        </div>
        <div class="center">
            <img src="https://cdn-icons-png.flaticon.com/512/1110/1110260.png" class="gears-img" alt="Gears">
        </div>
        <div class="column">
            <div class="btn" onclick="show('CARTOON')">⭐</div>
            <div class="btn" onclick="show('ΕΙΚΟΝΟΓΡΑΦΗΣΗ')">🖋️</div>
            <div class="btn" onclick="show('PORTFOLIO')">📁</div>
        </div>
    </div>
    <div class="name-section">
        <h2>Τουμαζάτος Νίκος</h2>
        <p>Illustrator - Ζωγράφος</p>
    </div>
    <div class="footer">
        <a href="https://www.google.com/maps/search/?api=1&query=Παπαφλέσσα+47+Πύργος" target="_blank">📍 Παπαφλέσσα 47, Πύργος</a>
        <div class="line"></div>
        <a href="tel:6939637129">📞 6939 637129</a>
        <div class="line"></div>
        <a href="mailto:toumazatosn@gmail.com">✉️ toumazatosn@gmail.com</a>
    </div>
</div>

<script>
    function show(val) {
        const el = document.getElementById('display-text');
        el.innerText = val;
        setTimeout(() => { el.innerText = ''; }, 2500);
    }
</script>
</body>
</html>

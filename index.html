<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Το Εργαστήρι - Τουμαζάτος Νίκος: Μαθήματα Ζωγραφικής, Ελεύθερου Σχεδίου, Comic, Cartoon και Εικονογράφησης στον Πύργο.">
    <meta name="keywords" content="Ζωγραφική, Σχέδιο, Comic, Cartoon, Εικονογράφηση, Πύργος, Τουμαζάτος Νίκος, Το Εργαστήρι">
    <meta name="author" content="Τουμαζάτος Νίκος">
    
    <meta property="og:title" content="Το Εργαστήρι - Τουμαζάτος Νίκος">
    <meta property="og:description" content="Καλλιτεχνικό εργαστήρι στον Πύργο.">
    <meta property="og:image" content="images/index-layout.png">
    
    <title>Το Εργαστήρι - Τουμαζάτος Νίκος</title>

    <style>
        :root { --yellow-brand: #f1c40f; }
        
        body { 
            margin: 0; 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .main-layout { width: 100%; display: block; }

        /* Χώρος εμφάνισης κειμένου - Μετακίνηση πιο πάνω */
        #display-text {
            position: absolute;
            top: 23.5%; 
            width: 100%;
            text-align: center;
            color: var(--yellow-brand);
            font-weight: bold;
            font-size: 1.6em;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            pointer-events: none;
            min-height: 1.5em;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Αόρατα κουμπιά εικονιδίων */
        .icon-link {
            position: absolute;
            background: rgba(255, 255, 255, 0); 
            cursor: pointer;
            z-index: 5;
            transition: transform 0.2s ease;
        }

        .icon-link:hover {
            transform: scale(1.15);
        }

        .footer-link {
            position: absolute;
            background: rgba(255, 255, 255, 0); 
            cursor: pointer;
            z-index: 5;
        }

        /* ΘΕΣΕΙΣ ΒΑΣΕΙ ΤΕΛΕΥΤΑΙΑΣ ΒΑΘΜΟΝΟΜΗΣΗΣ */
        .btn-1 { top: 43%; left: 1%; width: 12%; height: 7%; } 
        .btn-2 { top: 50.3%; left: 1%; width: 12%; height: 7%; } 
        .btn-3 { top: 57.7%; left: 1%; width: 12%; height: 7%; } 
        .btn-4 { top: 43%; right: 1%; width: 12%; height: 7%; } 
        .btn-5 { top: 50.3%; right: 1%; width: 12%; height: 7%; } 
        .btn-6 { top: 57.7%; right: 1%; width: 12%; height: 7%; } 

        .f-addr { bottom: 13.5%; left: 25%; width: 50%; height: 4.5%; } 
        .f-tel  { bottom: 8.5%;  left: 30%; width: 40%; height: 4.5%; } 
        .f-mail { bottom: 3.5%;  left: 20%; width: 60%; height: 4.5%; } 

    </style>
</head>
<body>

<div class="wrapper">
    <div id="display-text"></div>
    
    <img src="images/index-layout.png" alt="Το Εργαστήρι - Τουμαζάτος Νίκος" class="main-layout">

    <div class="icon-link btn-1" onmouseover="showText('ΕΛΕΥΘΕΡΟ ΣΧΕΔΙΟ')" onmouseout="clearText()"></div>
    <div class="icon-link btn-2" onmouseover="showText('ΖΩΓΡΑΦΙΚΗ')" onmouseout="clearText()"></div>
    <div class="icon-link btn-3" onmouseover="showText('COMIK')" onmouseout="clearText()"></div>
    <div class="icon-link btn-4" onmouseover="showText('CARTOON')" onmouseout="clearText()"></div>
    <div class="icon-link btn-5" onmouseover="showText('ΕΙΚΟΝΟΓΡΑΦΗΣΗ')" onmouseout="clearText()"></div>
    <div class="icon-link btn-6" onclick="openPortfolio()" onmouseover="showText('PORTFOLIO')" onmouseout="clearText()"></div>

    <a href="https://www.google.com/maps/search/?api=1&query=Παπαφλέσσα+47+Πύργος" target="_blank" class="footer-link f-addr"></a>
    <a href="tel:6939637129" class="footer-link f-tel"></a>
    <a href="mailto:toumazatosn@gmail.com" class="footer-link f-mail"></a>
</div>

<script>
    const display = document.getElementById('display-text');

    function showText(msg) {
        display.innerText = msg;
        display.style.opacity = "1";
    }

    function clearText() {
        display.innerText = "";
        display.style.opacity = "0";
    }

    function openPortfolio() {
        window.location.href = "images/portfolio/"; 
    }
</script>

</body>
</html>

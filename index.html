<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το ΕΡΓΑΣΤΗΡΙ - Νίκος Τουμαζάτος</title>
    <meta name="description" content="Το Εργαστήρι - Νίκος Τουμαζάτος, Illustrator - Ζωγράφος στον Πύργο.">

    <style>
        :root {
            --yellow: #f2d027;
            --white: #ffffff;
            --grey: #8a8d8f;
        }

        body { 
            background-color: var(--white); 
            margin: 0; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        @keyframes rotateGear { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* ΡΥΘΜΙΣΗ: ΜΕΓΑΛΟ ΓΡΑΝΑΖΙ */
        .central-gear { 
            width: 380px; 
            fill: var(--yellow); 
            animation: rotateGear 25s linear infinite; /* Πολύ αργή κίνηση */
            margin: 40px 0; 
        }

        /* ΡΥΘΜΙΣΗ: ΜΙΚΡΑ ΕΙΚΟΝΙΔΙΑ */
        .mini-icon { 
            width: 25px; 
            fill: var(--yellow); 
            margin: 0 20px; 
        }

        h1 { color: var(--yellow); font-size: 3rem; margin-top: 50px; text-transform: uppercase; text-align: center; }
        h2 { color: var(--yellow); margin: 0; text-align: center; }
        p { text-align: center; font-size: 1.2rem; }

        footer { 
            width: 100%; 
            background: var(--grey); 
            color: white; 
            text-align: center; 
            padding: 25px 0; 
            margin-top: auto; 
            font-size: 1rem;
        }
        
        a { color: white; text-decoration: none; }
    </style>
</head>
